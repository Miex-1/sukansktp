<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hari Sukan Live</title>

<style>
body{background:#0b0b14;color:#fff;font-family:sans-serif;text-align:center;padding:20px}
h1{margin-bottom:20px}

/* CARD */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
.card{
  background:#16162a;
  padding:20px;
  border-radius:12px;
  position:relative;
  transition:all .4s ease;
  transform:scale(1);
}

/* ANIMATION */
.card.updated{
  animation:pop .5s ease;
}
@keyframes pop{
  0%{transform:scale(1)}
  50%{transform:scale(1.08)}
  100%{transform:scale(1)}
}

/* CHAMPION */
.card.rank1{
  border:2px solid gold;
  box-shadow:0 0 20px rgba(255,215,0,.6);
}

/* TEXT */
.rank{font-size:40px;opacity:.1;position:absolute;right:10px;top:0}
.house{font-size:18px;margin-bottom:10px}
.points{font-size:28px;font-weight:bold}
</style>
</head>

<body>

<h1>🏆 LIVE SCOREBOARD</h1>

<div id="board" class="grid"></div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ99NjQB1NJ4DcwMQsPQ4zNFB-Zh-G5_9u7dAr1ulGvicRXi8oWId_SCJJ77XgdZWWlUX9JVQeVtDm9/pub?gid=155371699&single=true&output=csv";

let lastData = [];

async function load(){
  const res = await fetch(URL);
  const text = await res.text();

  const rows = text.split("\n").map(r=>r.split(","));

  let data = [];

  for(let i=1;i<=4;i++){
    if(!rows[i]) continue;
    data.push({
      rumah: rows[i][6],
      mata: parseInt(rows[i][7])||0
    });
  }

  // sort ranking
  data.sort((a,b)=>b.mata-a.mata);

  render(data);
}

function render(data){
  const board = document.getElementById("board");

  board.innerHTML = data.map((d,i)=>{
    const prev = lastData.find(x=>x.rumah===d.rumah);

    let updated = "";
    if(prev && prev.mata !== d.mata){
      updated = "updated";
    }

    return `
      <div class="card ${i==0?'rank1':''} ${updated}">
        <div class="rank">${i+1}</div>
        <div class="house">${d.rumah}</div>
        <div class="points">${d.mata}</div>
      </div>
    `;
  }).join("");

  lastData = data;
}

// auto refresh
setInterval(load,5000);

load();
</script>

</body>
</html>
